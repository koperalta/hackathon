<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Transit Hub | Mobile Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'Roboto', 'system-ui', 'sans-serif']
          },
          colors: {
            ink: '#1f2937',
            soft: '#f8fafc',
            card: '#ffffff',
            line: '#e5e7eb',
            muted: '#6b7280',
            primary: '#111827',
            live: '#ef4444',
            accent: '#2563eb'
          },
          boxShadow: {
            app: '0 24px 60px rgba(15, 23, 42, 0.12)',
            card: '0 10px 30px rgba(15, 23, 42, 0.08)',
            float: '0 8px 24px rgba(15, 23, 42, 0.10)'
          }
        }
      }
    };
  </script>
</head>
<body class="bg-gray-100 font-sans text-ink antialiased">
  <div id="dashboard-root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" data-presets="env,react" src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
