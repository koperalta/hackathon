<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BiyaheIQ | Commuter App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <nav class="navbar navbar-expand-lg app-navbar sticky-top">
    <div class="container">
      <a class="navbar-brand" href="/">BiyaheIQ</a>
      <div class="navbar-nav ms-auto gap-2">
        <a class="nav-link" href="/monitor">Vehicle IoT Feed</a>
        <a class="nav-link active" href="/commuter">Commuter App</a>
        <a class="nav-link" href="/dashboard">Intelligence Hub</a>
      </div>
    </div>
  </nav>

  <main class="container page-shell">
    <div class="row g-4">
      <div class="col-lg-8">
        <div class="card section-card">
          <div class="card-body p-3">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <div>
                <div class="mono-label mb-2">Intelligence Hub</div>
                <h3 class="mb-0 text-gold">Live Mobility Map</h3>
                <small class="text-secondary">Dark-mode map with glowing Tiger Gold routes and occupancy-aware markers.</small>
              </div>
              <button id="refreshMapBtn" class="btn btn-sm btn-outline-gold">Refresh Vehicles</button>
            </div>
            <div class="route-line-legend mb-3"></div>
            <div id="commuterMap" class="map-panel"></div>
          </div>
        </div>
      </div>

      <div class="col-lg-4">
        <div class="card control-wing p-4 mb-4">
          <div class="mono-label mb-2">Control Wing</div>
          <h4 class="text-gold mb-3">Route Preference</h4>
          <select id="prioritySelect" class="form-select mb-3">
            <option value="fastest">Fastest route</option>
            <option value="cheapest">Cheapest route</option>
            <option value="least_crowded">Least crowded route</option>
            <option value="student_friendly">Student-friendly route</option>
            <option value="safest">Safest route</option>
            <option value="most_reliable">Most reliable route</option>
          </select>
          <button id="getRecommendationBtn" class="btn btn-primary w-100">Reveal Smart Recommendation</button>
        </div>

        <div class="card section-card mb-4 floating-panel">
          <div class="card-body p-4">
            <div class="mono-label mb-2">Smart Recommendation</div>
            <h4 class="mb-3 text-gold">Best Route Now</h4>
            <div id="bestRouteCard" class="route-card fleet-card rounded-4 p-3">Loading recommendation...</div>
            <div id="alternativeRoutes" class="mt-3 d-grid gap-2"></div>
          </div>
        </div>

        <div class="card section-card floating-panel">
          <div class="card-body p-4">
            <div class="mono-label mb-2">Ground Signal</div>
            <h4 class="mb-3 text-gold">Commuter Report</h4>
            <select id="reportVehicleSelect" class="form-select mb-3"></select>
            <select id="reportTypeSelect" class="form-select mb-3">
              <option>Full vehicle</option>
              <option>Long queue</option>
              <option>No available ride</option>
              <option>Unsafe stop</option>
              <option>Fare issue</option>
              <option>Route unavailable</option>
            </select>
            <input id="barangayInput" class="form-control mb-3" placeholder="Barangay or stop">
            <button id="submitReportBtn" class="btn btn-outline-gold w-100">Submit Report</button>
            <div id="reportResult" class="footer-note mt-3"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="{{ url_for('static', filename='js/commuter.js') }}"></script>
</body>
</html>
