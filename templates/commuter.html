<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Transit Hub | PITX Commuter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'Roboto', 'system-ui', 'sans-serif']
          },
          boxShadow: {
            app: '0 24px 60px rgba(15, 23, 42, 0.12)',
            card: '0 12px 32px rgba(15, 23, 42, 0.08)',
            float: '0 8px 24px rgba(15, 23, 42, 0.10)'
          }
        }
      }
    };
  </script>
  <style>
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="min-h-screen bg-gray-100 font-sans text-gray-900 antialiased">
  <main class="px-4 py-6 sm:px-6 sm:py-10">
    <div class="mx-auto max-w-5xl">
      <div class="mx-auto max-w-md rounded-[36px] bg-gray-50 p-4 shadow-app sm:p-5">
        <header class="mb-5">
          <div class="flex items-center justify-between">
            <div>
              <div class="text-xs uppercase tracking-[0.2em] text-gray-400">Transit Hub</div>
              <h1 class="mt-1 text-2xl font-bold">PITX Terminal</h1>
              <p class="mt-2 text-sm text-gray-500">Live queue detection + predictive wait time (demo feed).</p>
            </div>
            <a href="/" class="rounded-full border border-gray-200 bg-white px-4 py-2 text-sm font-medium text-gray-600 shadow-sm hover:bg-gray-50">
              Home
            </a>
          </div>
        </header>

        <!-- HERO: Live video + overlays -->
        <section class="rounded-3xl bg-white p-3 shadow-lg">
          <div class="relative overflow-hidden rounded-3xl bg-black">
            <img
              id="pitxVideo"
              src="/video_feed"
              alt="PITX live feed"
              class="h-80 w-full object-cover"
            />

            <!-- Camera overlays -->
            <div class="absolute left-4 top-4 flex items-center gap-2 rounded-full bg-black/45 px-3 py-1.5 text-xs font-semibold text-white backdrop-blur">
              <span class="h-2.5 w-2.5 rounded-full bg-red-500 shadow-[0_0_12px_rgba(239,68,68,0.9)]"></span>
              LIVE
            </div>
            <div class="absolute right-4 top-4 rounded-full bg-black/45 px-3 py-1.5 text-xs font-semibold text-white backdrop-blur">
              REC
            </div>
            <div id="timestampLabel" class="absolute right-4 top-14 rounded-full bg-black/45 px-3 py-1.5 text-xs font-medium text-white/90 backdrop-blur">
              --
            </div>

            <!-- Bottom overlays -->
            <div class="absolute bottom-4 left-4 right-4 flex flex-col gap-2">
              <div id="waitBadge" class="rounded-2xl bg-white px-4 py-3 text-gray-900 shadow-float">
                <div class="text-[11px] uppercase tracking-[0.22em] text-gray-500">Predictive AI</div>
                <div class="mt-1 text-lg font-semibold">PITX Estimated Wait: -- mins</div>
              </div>
              <div class="flex gap-2">
                <div id="peopleBadge" class="rounded-xl bg-black/55 px-3 py-2 text-sm font-semibold text-white backdrop-blur">
                  People Count: --
                </div>
                <div id="serviceLevelBadge" class="rounded-xl bg-black/55 px-3 py-2 text-sm font-semibold text-white backdrop-blur">
                  Service: --
                </div>
              </div>
            </div>
          </div>
        </section>

        <!-- Alternative route suggestion -->
        <section class="mt-4 rounded-3xl bg-blue-50 p-5 shadow-card">
          <div class="flex items-start justify-between gap-3">
            <div>
              <div class="text-xs font-semibold uppercase tracking-[0.2em] text-blue-600">Actionable</div>
              <h2 class="mt-2 text-lg font-semibold text-gray-900">Smart Route Alternative</h2>
            </div>
            <div id="timeSavedBadge" class="rounded-full bg-blue-600 px-3 py-1 text-xs font-semibold text-white">
              --
            </div>
          </div>
          <p id="routeSuggestion" class="mt-3 text-sm leading-6 text-gray-700">
            Loading route suggestion...
          </p>
        </section>

        <footer class="mt-5 rounded-2xl bg-white p-4 text-xs text-gray-500 shadow-sm">
          Aligned with SDGs 4, 8, 10, &amp; 11.
        </footer>
      </div>
    </div>
  </main>

  <script src="{{ url_for('static', filename='js/commuter.js') }}"></script>
</body>
</html>
